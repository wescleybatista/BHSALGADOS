<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Cadastro de Produtos - BH SALGADOS</title>
    
</head>

<body>

    <div class="home">
        <a href="principal.html" id="home">PÁGINA PRINCIPAL</a>

        <div class="principal">
            <img src="/salgados.jpg" alt="Logo BH Salgados">
            <h2>PRODUTOS</h2>
            
            <form class="formulario" id="formProdutos">
                <div class="grad1">
                    <label for="salgados">SALGADOS DE FESTA:</label>
                    <div class="linha-produto">
                        <select id="salgados">
                            <option value="0">Selecione</option>
                            <option value="20.00">Salgados De Festa - 25 unidades FRITO</option>
                            <option value="18.00">Salgados De Festa - 25 unidades CONGELADO</option>
                            <option value="80.00">Cento FRITO - 100 salgados</option>
                            <option value="70.00">Cento CONGELADO - 100 salgados</option>
                            <option value="35.00">Bolinho De Bacalhau FRITO - 500g</option>
                            <option value="30.00">Bolinho De Bacalhau CONGELADO - 500g</option>
                            <option value="55.00">Bolinho De Costela FRITO - 1kg</option>
                            <option value="50.00">Bolinho De Costela CONGELADO - 1kg</option>
                            <option value="48.00">Bolinho De Feijoada FRITO - 900g</option>
                            <option value="42.00">Bolinho De Feijoada CONGELADO - 900g</option>
                            <option value="75.00">Camarão Empanado FRITO - 1kg</option>
                            <option value="68.00">Camarão Empanado CONGELADO - 1kg</option>
                            <option value="60.00">Salmão Com Cream Cheese FRITO - 700g </option>
                            <option value="54.00">Salmão Com Cream Cheese CONGELADO - 700g </option>
                            <option value="28.00">Pão De Queijo CONGELADO - 1kg</option>
                            <option value="22.00">Nhoque CONGELADO - 1kg</option>
                        </select>
                        <div class="controle-quantidade">
                            <button type="button" class="btn-qtd btn-menos" onclick="alterarQtd('qtd_salgados', -1)">-</button>
                            <input type="text" id="qtd_salgados" class="input-qtd" value="1" readonly>
                            <button type="button" class="btn-qtd btn-mais" onclick="alterarQtd('qtd_salgados', 1)">+</button>
                        </div>
                    </div>
                    
                    <label for="assados">ASSADOS:</label>
                    <div class="linha-produto">
                        <select id="assados">
                            <option value="0">Selecione</option>
                            <option value="25.00">Mini Pizza - 25 unidades</option>
                            <option value="22.00">Mini Assadinho - 20 unidades</option>
                            <option value="24.00">Mini Empada - 20 unidades</option>
                        </select>
                        <div class="controle-quantidade">
                            <button type="button" class="btn-qtd btn-menos" onclick="alterarQtd('qtd_assados', -1)">-</button>
                            <input type="text" id="qtd_assados" class="input-qtd" value="1" readonly>
                            <button type="button" class="btn-qtd btn-mais" onclick="alterarQtd('qtd_assados', 1)">+</button>
                        </div>
                    </div>

                    <label for="doces">DOCES:</label>
                    <div class="linha-produto">
                        <select id="doces">
                            <option value="0">Selecione</option>
                            <option value="26.00">Quiches Doces - 20 unidades</option>
                            <option value="25.00">Mini Folhado doces - 20 unidades</option>
                            <option value="22.00">Mini Churros FRITOS - 25 unidades</option>
                            <option value="19.50">Mini Churros CONGELADOS - 25 unidades</option>
                        </select>
                        <div class="controle-quantidade">
                            <button type="button" class="btn-qtd btn-menos" onclick="alterarQtd('qtd_doces', -1)">-</button>
                            <input type="text" id="qtd_doces" class="input-qtd" value="1" readonly>
                            <button type="button" class="btn-qtd btn-mais" onclick="alterarQtd('qtd_doces', 1)">+</button>
                        </div>
                    </div>

                    <label for="biscoito">BISCOITO:</label>
                    <div class="linha-produto">
                        <select id="biscoito">
                            <option value="0">Selecione</option>
                            <option value="8.50">Torradinha Com Queijo - 100g</option>
                        </select>
                        <div class="controle-quantidade">
                            <button type="button" class="btn-qtd btn-menos" onclick="alterarQtd('qtd_biscoito', -1)">-</button>
                            <input type="text" id="qtd_biscoito" class="input-qtd" value="1" readonly>
                            <button type="button" class="btn-qtd btn-mais" onclick="alterarQtd('qtd_biscoito', 1)">+</button>
                        </div>
                    </div>
                </div>

                <div class="grad2">
                    <label for="azeites">AZEITES:</label>
                    <div class="linha-produto">
                        <select id="azeites">
                            <option value="0">Selecione</option>
                            <option value="22.00">Miranda Extra Virgem</option>
                            <option value="19.00">Do Chef Blend Premium</option>
                        </select>
                        <div class="controle-quantidade">
                            <button type="button" class="btn-qtd btn-menos" onclick="alterarQtd('qtd_azeites', -1)">-</button>
                            <input type="text" id="qtd_azeites" class="input-qtd" value="1" readonly>
                            <button type="button" class="btn-qtd btn-mais" onclick="alterarQtd('qtd_azeites', 1)">+</button>
                        </div>
                    </div>

                    <label for="mel">MEL:</label>
                    <div class="linha-produto">
                        <select id="mel">
                            <option value="0">Selecione</option>
                            <option value="32.00">Mel Serra D'Ouro Florada Natural - 700g</option>
                            <option value="15.00">Doce Com Mel D'Serra Gerais</option>
                        </select>
                        <div class="controle-quantidade">
                            <button type="button" class="btn-qtd btn-menos" onclick="alterarQtd('qtd_mel', -1)">-</button>
                            <input type="text" id="qtd_mel" class="input-qtd" value="1" readonly>
                            <button type="button" class="btn-qtd btn-mais" onclick="alterarQtd('qtd_mel', 1)">+</button>
                        </div>
                    </div>

                    <label for="promocoes">PROMOÇÕES:</label>
                    <div class="linha-produto">
                        <select id="promocoes">
                            <option value="0">Selecione</option>
                            <option value="165.00">200 Salgados + 2 Refri 2L</option>
                            <option value="85.00">100 Salgados + 1 Refri 2L</option>
                            <option value="68.00">75 Salgados + 1 Refri 2L</option>
                            <option value="48.00">50 Salgados + 1 Refri 2L</option>
                            <option value="99.00">100 Salgados + 1 Refri 2L + 25 Mini Churros</option>
                        </select>
                        <div class="controle-quantidade">
                            <button type="button" class="btn-qtd btn-menos" onclick="alterarQtd('qtd_promocoes', -1)">-</button>
                            <input type="text" id="qtd_promocoes" class="input-qtd" value="1" readonly>
                            <button type="button" class="btn-qtd btn-mais" onclick="alterarQtd('qtd_promocoes', 1)">+</button>
                        </div>
                    </div>

                    <label for="outros">OUTROS:</label>
                    <div class="linha-produto">
                        <select id="outros">
                            <option value="0">Selecione</option>
                            <option value="29.00">Palmito Pupunha Savana - Extra Macio</option>
                            <option value="34.00">Requeijão Em Barra - Peça</option>
                        </select>
                        <div class="controle-quantidade">
                            <button type="button" class="btn-qtd btn-menos" onclick="alterarQtd('qtd_outros', -1)">-</button>
                            <input type="text" id="qtd_outros" class="input-qtd" value="1" readonly>
                            <button type="button" class="btn-qtd btn-mais" onclick="alterarQtd('qtd_outros', 1)">+</button>
                        </div>
                    </div>
                </div>

                <div class="container-botoes-acao">
                    <input type="button" value="SALVAR PRODUTO" id="salvar" onclick="SALVAR()">
                    <input type="reset" value="LIMPAR" onclick="LIMPAR_CAMPOS()">
                </div>
            </form>
        </div>
    </div>

    <script>
        // Função para alterar a quantidade de um campo específico
        function alterarQtd(idCampo, valor) {
            let campo = document.getElementById(idCampo);
            let qtdAtual = Number(campo.value) || 1;
            let novaQtd = qtdAtual + valor;
            
            if (novaQtd < 1) novaQtd = 1; // Impede que a quantidade seja menor que 1
            
            campo.value = novaQtd;
        }

        // Função principal para salvar os itens selecionados no localStorage do carrinho
        function SALVAR() {
            // Arrays de mapeamento dos IDs dos selects e de suas respectivas quantidades
            let categorias = [
                { selectId: 'salgados', qtdId: 'qtd_salgados' },
                { selectId: 'assados', qtdId: 'qtd_assados' },
                { selectId: 'doces', qtdId: 'qtd_doces' },
                { selectId: 'biscoito', qtdId: 'qtd_biscoito' },
                { selectId: 'azeites', qtdId: 'qtd_azeites' },
                { selectId: 'mel', qtdId: 'qtd_mel' },
                { selectId: 'promocoes', qtdId: 'qtd_promocoes' },
                { selectId: 'outros', qtdId: 'qtd_outros' }
            ];

            // Busca o carrinho já existente no localStorage ou cria um array vazio
            let carrinho = JSON.parse(localStorage.getItem('carrinho_bh')) || [];
            let itensAdicionados = 0;

            // Percorre cada categoria para verificar o que o usuário selecionou
            categorias.forEach(item => {
                let elementoSelect = document.getElementById(item.selectId);
                let precoValue = parseFloat(elementoSelect.value);

                // Se o valor for maior que "0", significa que um produto válido foi escolhido
                if (precoValue > 0) {
                    let opcaoSelecionada = elementoSelect.options[elementoSelect.selectedIndex];
                    let nomeProduto = opcaoSelecionada.text; // Pega o texto visível da opção
                    let quantidade = parseInt(document.getElementById(item.qtdId).value) || 1;

                    // Verifica se o mesmo produto já existe no carrinho para apenas somar a quantidade
                    let produtoExistente = carrinho.find(p => p.nome === nomeProduto);

                    if (produtoExistente) {
                        produtoExistente.qtd += quantidade;
                    } else {
                        // Se for um item novo, adiciona o objeto completo ao array
                        carrinho.push({
                            nome: nomeProduto,
                            preco: precoValue,
                            qtd: quantidade
                        });
                    }
                    itensAdicionados++;
                }
            });

            // Validação: se nenhum seletor foi mexido, emite o alerta e interrompe a função
            if (itensAdicionados === 0) {
                alert("Selecione pelo menos um produto antes de salvar!");
                return;
            }

            // Grava os dados atualizados de volta no localStorage do navegador
            localStorage.setItem('carrinho_bh', JSON.stringify(carrinho));

            alert("Produto(s) adicionado(s) ao carrinho com sucesso!");
            LIMPAR_CAMPOS();
        }

        // Função para resetar seletores e forçar que as caixas de quantidades voltem para 1
        function LIMPAR_CAMPOS() {
            let selects = ['salgados', 'assados', 'doces', 'biscoito', 'azeites', 'mel', 'promocoes', 'outros'];
            let qtds = ['qtd_salgados', 'qtd_assados', 'qtd_doces', 'qtd_biscoito', 'qtd_azeites', 'qtd_mel', 'qtd_promocoes', 'qtd_outros'];
            
            selects.forEach(id => document.getElementById(id).value = "0");
            qtds.forEach(id => document.getElementById(id).value = "1");
        }
    </script>
</body>

</html>
